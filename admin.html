<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KCC Admin Panel</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

.login-box,.dashboard{
max-width:450px;
margin:50px auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#0b3d91;
}

input{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#0b3d91;
color:white;
border:none;
font-size:18px;
cursor:pointer;
border-radius:8px;
}

button:hover{
background:#062b67;
}

.dashboard{
display:none;
}

.card{
background:#0b3d91;
color:white;
padding:20px;
margin:15px 0;
border-radius:10px;
text-align:center;
font-size:22px;
}
</style>

</head>

<body>

<div class="login-box" id="loginBox">

<h2>🔐 KCC Admin Login</h2>

<input type="email" id="email" placeholder="Enter Admin Email">

<input type="password" id="password" placeholder="Enter Admin Password">

<button onclick="login()">Login</button>

</div>

<div class="dashboard" id="dashboard">

<h2>🏏 KCC Admin Dashboard</h2>

<div class="card">
👥 Total Registrations
<br>
<span id="totalReg">0</span>
</div>

<div class="card">
🌐 Website Visitors
<br>
Google Analytics
</div>

</div>

<script>
async function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

await signInWithEmailAndPassword(auth,email,password);

document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";

loadRegistrations();

}catch(error){

alert("Login Failed");

}

}
</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB7FSWjvzqwMahwOY55KbVow6_Y8r8vbx8",
  authDomain: "kcc-registration.firebaseapp.com",
  projectId: "kcc-registration",
  storageBucket: "kcc-registration.firebasestorage.app",
  messagingSenderId: "719610715810",
  appId: "1:719610715810:web:cffe40efed97e992a641fb",
  measurementId: "G-48SK77DVMT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadRegistrations(){
const snap = await getDocs(collection(db,"registrations"));
document.getElementById("totalReg").innerText = snap.size;
}

loadRegistrations();

</script>
</body>
</html>
